version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing Terraform..."
      - mkdir -p /tmp/terraform_install
      - cd /tmp/terraform_install
      - TERRAFORM_VERSION="1.15.6"
      - curl -sSL https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip -o terraform.zip
      - unzip -o terraform.zip
      - mv terraform /usr/local/bin/
      - terraform version

      - echo "Installing Trivy..."
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
      - install -m 755 ./bin/trivy /usr/local/bin/trivy
      - trivy --version

      - echo "Installing tfsec..."
      - mkdir -p $HOME/bin
      - curl -sSL https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 -o $HOME/bin/tfsec
      - chmod +x $HOME/bin/tfsec
      - export PATH=$HOME/bin:$PATH
      - tfsec --version

  pre_build:
    commands:
      - echo "Returning to source directory..."
      - cd $CODEBUILD_SRC_DIR
      - trivy fs . --severity HIGH,CRITICAL --exit-code 1
      - tfsec . --minimum-severity HIGH

  build:
    commands:
      - cd terraform
      - terraform init -input=false
      - terraform validate
      - terraform plan -input=false -out=tfplan

artifacts:
  files:
    - '**/*'
