version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11

    commands:
      - echo "=== CLEAN INSTALL ==="
      - yum install -y yum-utils
      - yum-config-manager --add-repo https://rpm.releases.hashicorp.com/AmazonLinux/hashicorp.repo
      - yum install -y terraform
      - terraform version

      - echo "=== INSTALLING TRIVY ==="
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
      - install -m 755 ./bin/trivy /usr/local/bin/trivy
      - trivy --version

      - echo "=== INSTALLING TFSEC ==="
      - curl -sSL https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 -o /usr/local/bin/tfsec
      - chmod +x /usr/local/bin/tfsec
      - tfsec --version

  pre_build:
    commands:
      - echo "=== MOVING TO SOURCE ==="
      - cd $CODEBUILD_SRC_DIR

      - echo "=== RUNNING SECURITY SCANS ==="
      - trivy fs . --severity HIGH,CRITICAL --exit-code 0 || true
      - tfsec ./terraform --minimum-severity HIGH || true

  build:
    commands:
      - echo "=== TERRAFORM INIT ==="
      - cd terraform
      - terraform init -input=false

      - echo "=== TERRAFORM PLAN ==="
      - terraform plan

      - echo "=== TERRAFORM APPLY ==="
      - terraform apply -auto-approve

  post_build:
    commands:
      - echo "=== PIPELINE COMPLETE ==="
