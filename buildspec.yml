version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies"
      - pip install flask

  build:
  commands:
    - echo "Current directory:"
    - pwd
    - echo "Listing files:"
    - ls -la
    - echo "Running app"
    - python3 app.py

artifacts:
  files:
    - app.py
