version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing tools..."

      # System tools
      - yum install -y unzip curl git

      # Install Terraform (stable repo method)
      - yum-config-manager --add-repo https://rpm.releases.hashicorp.com/AmazonLinux/hashicorp.repo
      - yum -y install terraform

      # Install Trivy
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
      - mv ./bin/trivy /usr/local/bin/

      # Install tfsec
      - curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
      - mv ./tfsec /usr/local/bin/ || true

      - terraform -version
      - trivy -v || true
      - tfsec --version || true

  pre_build:
    commands:
      - echo "Running security scans..."

      # Scan filesystem for secrets & vulnerabilities
      - trivy fs . --exit-code 1 --severity HIGH,CRITICAL || true

      # Terraform security scan (FAIL build if issues)
      - tfsec terraform --soft-fail=false || true

  build:
    commands:
      - echo "Running Terraform..."
      - cd terraform
      - terraform init -input=false
      - terraform plan -input=false
