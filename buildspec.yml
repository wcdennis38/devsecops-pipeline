version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Detecting OS package manager..."

      # Detect package manager
      - |
        if command -v dnf >/dev/null 2>&1; then
          PKG="dnf"
        else
          PKG="yum"
        fi

      - echo "Using package manager: $PKG"

      # Install base tools safely
      - $PKG install -y unzip curl git

      # Install Terraform (safe method)
      - curl -fsSL https://releases.hashicorp.com/terraform/1.9.5/terraform_1.9.5_linux_amd64.zip -o terraform.zip
      - unzip terraform.zip
      - mv terraform /usr/local/bin/
      - terraform -version

      # Install Trivy
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
      - mv ./bin/trivy /usr/local/bin/

      # Install tfsec
      - curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash || true

  build:
    commands:
      - echo "Running Terraform pipeline..."
      - cd terraform
      - terraform init -input=false
      - terraform validate
      - terraform plan -input=false

      - echo "Running security scans..."
      - trivy fs . --exit-code 1 --severity HIGH,CRITICAL || true
      - tfsec . || true 
