version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Setting up environment..."
      - mkdir -p /tmp/terraform_install
      - cd /tmp/terraform_install

      # Install Terraform
      - TERRAFORM_VERSION="1.15.6"
      - curl -sSL https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip -o terraform.zip
      - unzip -o terraform.zip
      - mv terraform /usr/local/bin/
      - terraform version

      # Install Trivy
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
      - install -m 755 ./bin/trivy /usr/local/bin/trivy
      - trivy --version

      # Install tfsec
      - curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
      - tfsec --version

  pre_build:
    commands:
      - echo "Running Trivy filesystem scan..."
      - trivy fs . --severity HIGH,CRITICAL --exit-code 1
      - echo "Running tfsec Terraform scan..."
      - tfsec terraform --minimum-severity HIGH

  build:
    commands:
      - echo "Changing to Terraform directory..."
      - cd terraform

      - echo "Initializing Terraform..."
      - terraform init -input=false

      - echo "Validating Terraform..."
      - terraform validate

      - echo "Creating Terraform plan..."
      - terraform plan -input=false -out=tfplan

artifacts:
  files:
    - '**/*'
