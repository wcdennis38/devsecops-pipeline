version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing tools"
      - pip install flask
      - curl -o terraform.zip https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
      - unzip terraform.zip
      - mv terraform /usr/local/bin/

  build:
    commands:
      - echo "Running DevSecOps pipeline checks"
      - python3 -m py_compile app.py
      - cd terraform
      - terraform init
      - terraform validate
      - terraform fmt -check

artifacts:
  files:
    - app.py
    - terraform/*
