version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing Terraform..."
      - curl -sSL https://releases.hashicorp.com/terraform/1.15.6/terraform_1.15.6_linux_amd64.zip -o terraform.zip
      - python -m zipfile -e terraform.zip .
      - mv terraform /usr/local/bin/
      - chmod +x /usr/local/bin/terraform
      - terraform version

      - echo "Installing Trivy..."
      - curl -sSL https://github.com/aquasecurity/trivy/releases/latest/download/trivy_$(uname -s)_$(uname -m).tar.gz -o trivy.tar.gz
      - tar -xzf trivy.tar.gz
      - mv trivy /usr/local/bin/
      - chmod +x /usr/local/bin/trivy
      - trivy --version

      - echo "Installing tfsec..."
      - curl -sSL https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 -o tfsec
      - mv tfsec /usr/local/bin/
      - chmod +x /usr/local/bin/tfsec
      - tfsec --version

  pre_build:
    commands:
      - echo "Running security scans..."
      - trivy fs . --severity HIGH,CRITICAL --exit-code 1
      - tfsec . --minimum-severity HIGH

  build:
    commands:
      - echo "Running Terraform..."
      - cd terraform
      - terraform init -input=false
      - terraform validate
      - terraform plan -input=false -out=tfplan

artifacts:
  files:
    - "**/*"
