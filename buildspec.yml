version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "=== CLEANING ENV ==="
      - rm -rf ~/.terraform.d || true
      - rm -rf .terraform || true
      - rm -rf /tmp/* || true
      - export TF_PLUGIN_CACHE_DIR=/tmp
      - export TMPDIR=/tmp

      - echo "=== INSTALLING TERRAFORM SAFELY ==="
      - TERRAFORM_VERSION="1.15.6"
      - curl -fsSL -o terraform.zip https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip
      - file terraform.zip
      - unzip -t terraform.zip
      - unzip -o terraform.zip
      - chmod +x terraform
      - mv terraform /usr/local/bin/
      - terraform version

      - echo "=== INSTALLING TRIVY ==="
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
      - install -m 755 ./bin/trivy /usr/local/bin/trivy
      - trivy --version

      - echo "=== INSTALLING TFSEC ==="
      - mkdir -p $HOME/bin
      - curl -sSL https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 -o $HOME/bin/tfsec
      - chmod +x $HOME/bin/tfsec
      - export PATH=$HOME/bin:$PATH
      - tfsec --version

  pre_build:
    commands:
      - echo "=== MOVING TO SOURCE ==="
      - cd $CODEBUILD_SRC_DIR

      - echo "=== RUNNING TRIVY SCAN ==="
      - trivy fs . --severity HIGH,CRITICAL --exit-code 1 || true

      - echo "=== RUNNING TFSEC SCAN ==="
      - tfsec ./terraform --minimum-severity HIGH || true

  build:
    commands:
      - echo "=== TERRAFORM WORKFLOW ==="
      - cd terraform
      - terraform init -input=false
      - terraform validate
      - terraform plan -input=false -out=tfplan

artifacts:
  files:
    - '**/*'
    - terraform/tfplan
