version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11

    commands:
      - echo "=== INSTALLING TERRAFORM ==="
      - TERRAFORM_VERSION="1.6.6"
      - curl -fsSL -o terraform.zip https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip
      - unzip -o terraform.zip
      - chmod +x terraform
      - mv terraform /usr/local/bin/
      - terraform version

      - echo "=== INSTALLING TRIVY ==="
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
      - if [ -f ./bin/trivy ]; then mv ./bin/trivy /usr/local/bin/trivy; fi
      - trivy --version

      - echo "=== INSTALLING TFSEC ==="
      - curl -sSL https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 -o tfsec
      - chmod +x tfsec
      - mv tfsec /usr/local/bin/tfsec
      - tfsec --version

  pre_build:
    commands:
      - echo "=== MOVE TO SOURCE ==="
      - cd $CODEBUILD_SRC_DIR

      - echo "=== SECURITY SCAN (TRIVY) ==="
      - trivy fs . --severity HIGH,CRITICAL || true

      - echo "=== SECURITY SCAN (TFSEC) ==="
      - tfsec ./terraform --minimum-severity HIGH || true

  build:
    commands:
      - echo "=== TERRAFORM INIT ==="
      - cd terraform
      - terraform init -input=false

      - echo "=== TERRAFORM VALIDATE ==="
      - terraform validate

      - echo "=== TERRAFORM PLAN ==="
      - terraform plan -input=false -out=tfplan

  post_build:
    commands:
      - echo "=== PIPELINE COMPLETE SUCCESSFULLY ==="

artifacts:
  files:
    - "**/*"
    - terraform/tfplan
