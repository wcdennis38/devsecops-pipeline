version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies"
      - pip install flask
      - curl -LO https://releases.hashicorp.com/terraform/1.15.6/terraform_1.15.6_linux_amd64.zip
      - unzip terraform_1.15.6_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - terraform --version

  build:
    commands:
      - echo "Running Terraform"
      - terraform init
      - terraform plan
      - terraform apply -auto-approve

artifacts:
  files:
    - '**/*'
