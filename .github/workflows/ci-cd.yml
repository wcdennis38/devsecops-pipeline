name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Trivy (safe & stable)
        run: |
          set -euo pipefail

          echo "Installing Trivy..."
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

          echo "Verifying installation..."
          trivy version

      - name: Trivy Filesystem Scan (Vuln + Secrets)
        run: |
          set -euo pipefail

          trivy fs \
            --scanners vuln,secret \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            .

      - name: Trivy Config Scan (IaC security)
        run: |
          set -euo pipefail

          trivy config \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            .

  build:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          set -euo pipefail
          docker build -t devsecops-app:${{ github.sha }} .

  terraform:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          set -euo pipefail
          terraform init

      - name: Terraform Validate
        run: |
          set -euo pipefail
          terraform validate
