name: SOC2 DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  security_scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0f5f1cf3f3c7a2c9c1a2f7f2d1b4b

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@f1f5c2a6d9d3e1c0b8a2f3d9c7e4a1b2c3d4e5f6
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

  deploy:
    needs: security_scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0f5f1cf3f3c7a2c9c1a2f7f2d1b4b

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@b0c2a3d4e5f60718293a4b5c6d7e8f9012345678
        with:
          role-to-assume: arn:aws:iam::150460248370:role/dev-sec-ops-role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.6

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform
