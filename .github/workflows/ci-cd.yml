name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
        HEAD

        HEAD
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/download/v0.71.2/trivy_0.71.2_Linux-64bit.deb
          sudo dpkg -i trivy_0.55.0_Linux-64bit.deb
         c34b873 (Update DevSecOps pipeline fixes)

          echo "Installing Trivy..."
        628b635 (Add .dockerignore to prevent sensitive data leakage)
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

          trivy version

      - name: Trivy FS Scan
        run: |
          trivy fs \
            --scanners vuln,secret \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            .

      - name: Trivy Config Scan
        run: |
          trivy config \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            .

  build:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t devsecops-app:${{ github.sha }} .

  terraform:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate
